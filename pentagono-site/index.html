<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PentágonoGB</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- CABEÇALHO -->
    <header>
        <div class="logo">
            <img src="img/logo.png" alt="Logo PentágonoGB">
            <h1>PENTÁGONOGB</h1>
        </div>

        <button>Fale com nossos especialistas</button>
    </header>

    <!-- SOBRE NÓS -->
    <section id="sobre">

        <h2>SOBRE NÓS</h2>

        <div class="sobre-container">

            <div class="sobre-imagem">
                <img src="img/agencia.jpg" alt="Foto da agência">
            </div>

            <div class="sobre-texto">
                <p>
                    Descrição sobre a agência.
                </p>
            </div>

        </div>

    </section>

    <!-- PORTFÓLIO -->
    <section id="portfolio">

        <h2>PORTFÓLIO</h2>

        <div class="galeria">

            <div class="item">
                <img src="img/portfolio1.jpg" alt="">
            </div>

            <div class="item">
                <img src="img/portfolio2.jpg" alt="">
            </div>

            <div class="item">
                <img src="img/portfolio3.jpg" alt="">
            </div>

            <div class="item">
                <img src="img/portfolio4.jpg" alt="">
            </div>

            <div class="item">
                <img src="img/portfolio5.jpg" alt="">
            </div>

            <div class="item">
                <img src="img/portfolio6.jpg" alt="">
            </div>

            <div class="item">
                <img src="img/portfolio7.jpg" alt="">
            </div>

            <div class="item">
                <img src="img/portfolio8.jpg" alt="">
            </div>

        </div>

    </section>

    <!-- CATÁLOGO -->
    <section id="catalogo">

        <h2>CATÁLOGO</h2>

        <div class="produtos">

            <div class="produto">
                <h3>Produto</h3>

                <img src="img/produto1.jpg" alt="Produto">

              

                <button id="produtoBotao">Adicionar ao Carrinho</button>
            </div>

            <div class="produto">
                <h3>Produto</h3>

                <img src="img/produto2.jpg" alt="Produto">

              

                <button>Adicionar ao Carrinho</button>
            </div>

            <div class="produto">
                <h3>Produto</h3>

                <img src="img/produto3.jpg" alt="Produto">

                

                <button id="produtoBotao">Adicionar ao Carrinho</button>
            </div>

            <div class="produto">
                <h3>Produto</h3>

                <img src="img/produto4.jpg" alt="Produto">

              

                <button id="produtoBotao">Adicionar ao Carrinho</button>
            </div>

        </div>

    </section>

    <!-- CARRINHO -->
    <section class="Carrinho">
            <h1>Carrinho</h1>

            <h2>Produtos</h2>
            <div id="lista-produtos"></div>

           
            <div id="lista-carrinho"></div>
            <h3 id="total"></h3>
            <button id="limpar">Limpar Carrinho</button>
            <button id="comprar">Comprar</button>
            <p id="texto-comprar"></p>
            
        </section>
        <script src="script.js"></script>
</body>
</html>
